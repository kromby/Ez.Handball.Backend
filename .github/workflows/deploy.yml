name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: the workflow requests a short-lived token that the Azure AD app
# "ez-handball-gha-deploy" trusts (federated credential on this repo's main branch).
# No stored Azure passwords or publish profiles.
permissions:
  id-token: write
  contents: read

jobs:
  deploy-api:
    name: API (App Service)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish API
        run: dotnet publish Ez.Handball.Api/Ez.Handball.Api.csproj -c Release -o publish_api

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ez-handball-api
          package: publish_api

  deploy-functions:
    name: Ingestion (Function App)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Functions
        run: dotnet publish Ez.Handball.Ingestion/Ez.Handball.Ingestion.csproj -c Release -o publish_func

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: Azure/functions-action@v1
        with:
          app-name: ez-handball-ingestion
          package: publish_func
